services:
  app:
    build: .
    ports:
      - "8000:8000"
    # Кэшируем скачанные веса между перезапусками контейнера,
    # чтобы не качать их с GitHub каждый раз.
    volumes:
      - model-weights:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  model-weights:
